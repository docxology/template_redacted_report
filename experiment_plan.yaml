    role: reference
    description: Public text without a redaction ledger.
  - name: audited_release
    role: proposed
    description: Sanitized text with classification ceiling and release authority.
  - name: residual_marker_release
    role: variant
    description: Negative-control release with uncovered sensitive marker.
